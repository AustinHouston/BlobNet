dataset:
  name: random_microscope_v1
  type: random
  output_dir: outputs/datasets/random_microscope_v1
  seed: 0
  prefix: sample
  splits:
    train: 1024
    val: 256
    test: 256

parameters:
  image_shape: [256, 256]
  min_atoms: 120
  max_atoms: 220
  min_separation: 12.5
  min_separation_range: [11.0, 15.0]
  sigma_range: [2.4, 4.0]
  intensity_range: [0.3, 1.0]
  target_sigma: 0.9
  background_range: [0.0, 0.3]
  gradient_range: [-0.08, 0.08]
  inhomogeneous_background_range: [0.0, 0.12]
  inhomogeneous_background_sigma_fraction_range: [0.18, 0.45]
  low_frequency_noise_range: [0.05, 0.25]
  low_frequency_sigma_fraction_range: [0.04, 0.12]
  read_noise_std_range: [0.02, 0.1]
  total_counts_range: [50.0, 25000.0]
  counts_per_pixel_range: null
  blur_sigma_range: [0.2, 1.0]
  edge_padding: 16
  normalize_input: true
  clamp_target: true
