dataset:
  name: square_2026_06_24a
  type: periodic_lattice
  output_dir: outputs/datasets/square_2026_06_24a
  seed: 0
  prefix: sample
  splits:
    train: 1024
    val: 256
    test: 256

parameters:
  image_shape: [256, 256]
  lattice_type: cubic
  lattice_spacing_range: [11.0, 15.0]
  rotation_range: [0.0, 180.0]
  jitter_std_range: [0.0, 0.25]
  vacancy_fraction_range: [0.0, 0.03]
  min_atoms: 120
  sigma_range: [2.4, 4.0]
  intensity_range: [0.3, 1.0]
  target_sigma: 0.9
  background_range: [0.0, 0.3]
  gradient_range: [-0.08, 0.08]
  inhomogeneous_background_range: [0.0, 0.12]
  inhomogeneous_background_sigma_fraction_range: [0.18, 0.45]
  low_frequency_noise_range: [0.05, 0.25]
  low_frequency_sigma_fraction_range: [0.04, 0.12]
  read_noise_std_range: [0.02, 0.1]
  total_counts_range: [50.0, 25000.0]
  counts_per_pixel_range: null
  blur_sigma_range: [0.2, 1.0]
  edge_padding: 16
  normalize_input: true
  clamp_target: true
